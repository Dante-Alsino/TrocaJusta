{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Troca Justa{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <a href="/" class="logo">
                <span class="logo-text">Troca Justa</span>
            </a>
            <nav class="nav-links">
                <a href="/">Início</a>
                <a href="{% url 'ads:list' %}">Catálogo</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'ads:create' %}" class="btn-primary">Criar Anúncio</a>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-text">Sair</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Entrar</a>
                    <a href="{% url 'register' %}" class="btn-primary">Cadastre-se</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2024 Troca Justa Charqueadas.</p>
        </div>
    </footer>
</body>
</html>
